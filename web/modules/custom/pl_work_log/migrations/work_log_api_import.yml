id: work_log_api_import
label: 'Import work logs from Hermes REST API'
migration_group: pl_work_log
migration_tags:
  - pl_work_log
  - hermes
  - api

source:
  plugin: hermes_api_work_log
  track_changes: true
  # api_url and api_token are read from env vars by default.
  # Override here for testing:
  # api_url: 'http://localhost:8090/api/work-logs'
  # api_token: 'test-token'

process:
  title: title
  field_work_log_date/value: date
  field_work_log_hours: hours
  field_work_log_event_id: event_id
  field_work_log_ingested_at/value: ingested_at
  field_work_log_project:
    plugin: term_by_machine_name
    source: project_id
    vocabulary: projects
  field_work_log_category:
    plugin: category_auto_map
    source: category
    vocabulary: work_log_categories
  type:
    plugin: default_value
    default_value: work_log
  status:
    plugin: default_value
    default_value: 1

destination:
  plugin: 'entity:node'
  default_bundle: work_log

migration_dependencies: {}
