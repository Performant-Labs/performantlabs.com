pl_work_log.dashboard:
  path: '/work-log-dashboard'
  defaults:
    _controller: '\Drupal\pl_work_log\Controller\DashboardController::build'
    _title: 'Work Log Dashboard'
  requirements:
    _role: 'authenticated'

pl_work_log.actions:
  path: '/work-logs/actions'
  defaults:
    _controller: '\Drupal\pl_work_log\Controller\ActionsController::overview'
    _title: 'Work Log Actions'
  requirements:
    _role: 'authenticated'

pl_work_log.actions.ingest:
  path: '/work-logs/actions/ingest'
  defaults:
    _form: '\Drupal\pl_work_log\Form\IngestForm'
    _title: 'Ingest from Calendar'
  requirements:
    _role: 'authenticated'

pl_work_log.actions.category_mapping:
  path: '/work-logs/actions/category-mapping'
  defaults:
    _form: '\Drupal\pl_work_log\Form\CategoryRulesForm'
    _title: 'Category Mapping Rules'
  requirements:
    _role: 'authenticated'
