name: Performant Labs V2
type: theme
'base theme': neonbyte
description: 'Performant Labs V2 — subtheme of Neonbyte (DripYard). All site customization lives here.'
core_version_requirement: ^11

libraries:
  - performant_labs_v2/base
version: 2.0.0
generator: 'performant_labs_v2:2.0.0'
dripyard_theme_level: subtheme

libraries-extend:
  core/components.dripyard_base--card:
    - performant_labs_v2/card
  core/components.dripyard_base--accordion-item:
    - performant_labs_v2/accordion
  core/components.dripyard_base--icon-list-item:
    - performant_labs_v2/icon-list
  core/components.dripyard_base--logo-grid:
    - performant_labs_v2/logo-grid
  core/components.dripyard_base--button:
    - performant_labs_v2/button
  core/components.dripyard_base--title-cta:
    - performant_labs_v2/title-cta
  core/components.neonbyte--hero:
    - performant_labs_v2/hero
  core/components.neonbyte--header:
    - performant_labs_v2/header
  core/components.neonbyte--footer:
    - performant_labs_v2/footer
  core/components.dripyard_base--grid-wrapper:
    - performant_labs_v2/grid-wrapper
  core/components.dripyard_base--section:
    - performant_labs_v2/dy-section
    - performant_labs_v2/webform
  core/components.neonbyte--header-article:
    - performant_labs_v2/header-article
  neonbyte/article-full:
    - performant_labs_v2/article-full

#
# Libraries extend will add custom libraries to specified libraries
# @see https://www.drupal.org/docs/develop/theming-drupal/adding-assets-css-js-to-a-drupal-theme-via-librariesyml
#

# libraries-extend:

# In this, case we extend dripyard_base's user-login-form library with
# our own of the same name.

#   dripyard_base/user-login-form:
#     - testtheme/user-login-form

# Here we extend dripyard_base's status-message SDC library with our own.

#  core/components.dripyard_base--status-messages:
#    - testtheme/status-messages

regions:
  header_first: Header first (logo)
  header_second: Header second (center)
  header_third: Header third (right)
  highlighted: Highlighted
  content: Content
  fixed_middle_right: Fixed middle right (local actions tabs)
  fixed_bottom_right: Fixed bottom right (messages)
  footer_top: Footer top
  footer_left: Footer left
  footer_right: Footer right
  footer_bottom: Footer bottom
