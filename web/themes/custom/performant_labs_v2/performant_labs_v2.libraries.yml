# Articles view — toolbar, grid, chips, pager.
# Phase 3: view-region CSS attached via attach_library() from
# views-exposed-form--articles--page-1.html.twig.
# Layer 5: scoped to .articles-toolbar, .chip, .article-grid, .pagination.
# No upstream conflict — all selectors are new Phase 3 markup.
articles-view:
  css:
    component:
      css/components/articles-view.css: {}

# Page title cream band — kicker + H1 + lede.
# Phase 4: attached via attach_library() from page--articles.html.twig.
# Layer 5: scoped to .page-title, .page-title__inner, .page-title__lede.
# Route-scoped to /articles only (template is page--articles.html.twig).
page-title:
  css:
    component:
      css/components/page-title.css: {}

# Article detail masthead — header-article SDC overrides.
# Layer 5: scoped to .header-article and children.
# Loaded via libraries-extend on core/components.neonbyte--header-article.
header-article:
  css:
    component:
      css/components/header-article.css: {}

# Article detail body — prose typography and rhythm.
# Layer 5: scoped to .article-full and children.
# Loaded via libraries-extend on neonbyte/article-full.
article-full:
  css:
    component:
      css/components/article-full.css: {}

# Webform + form-section chrome — two-column grid, input chrome, sidebar card.
# Layer 5: scoped to .block-webform-block, .form-item, .contact-sidebar.
# Loaded via libraries-extend on core/components.dripyard_base--section
# (webforms render inside sections; CSS selectors prevent bleed to non-form sections).
webform:
  css:
    component:
      css/components/webform.css: {}

# Book landing page — hero band, features grid, closing CTA.
# Cycle 1: attached via attach_library() from node--book--landing.html.twig.
# Layer 5: scoped to .book-landing, .closing-cta, .page-node-type-book.
# Chapter-index SDC manages its own CSS via libraryOverrides.
book-landing:
  css:
    component:
      css/components/book-landing.css: {}

# Interior book chapter page — docs grid, sidebar, compact header, tile pager.
# Cycle 2: attached via attach_library() from node--book--full.html.twig.
# Layer 5: scoped to .docs-grid, .docs-sidebar, .docs-content, .docs-prose,
# .chapter-header, .book-pager.
docs-page:
  css:
    component:
      css/components/docs-page.css: {}

# Breadcrumb link color fix (T finding W-1 / issue #280).
# Layer 5: scoped to .breadcrumb (overrides --breadcrumb-link-color only,
# not the shared --theme-link-color every inline link consumes).
# Loaded via libraries-extend on core/components.dripyard_base--breadcrumb.
breadcrumb:
  css:
    component:
      css/components/breadcrumb.css: {}
