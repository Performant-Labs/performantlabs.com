$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Header Article
status: stable
noUi: true
props:
  type: object
  properties:
    title:
      type: string
      title: Article title (rendered as h1)
    tags:
      type: string
      title: Taxonomy tags (render array accepted)
    author_name:
      type: string
      title: Author name
    date:
      type: string
      title: Formatted date
    display_submitted:
      type: boolean
      title: Whether to display submission info
    image:
      type: string
      title: Featured image (render array accepted)
slots:
  meta_content:
    title: Author and date metadata
  image_content:
    title: Featured image content
