name: DCO sign-off check

# Controlled by dco.required in .agents/pr-review.yml.
# Set required: true  → every commit must carry a Signed-off-by trailer.
# Set required: false → check is skipped entirely (default).
#
# Format:  Signed-off-by: Your Name <you@example.com>
# Add via: git commit -s   or   git commit --signoff

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  statuses: write

concurrency:
  group: dco-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dco:
    name: DCO sign-off check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Read dco.required from .agents/pr-review.yml
        id: cfg
        run: |
          REQUIRED="false"
          if [[ -f ".agents/pr-review.yml" ]]; then
            val=$(python3 - <<'PYEOF'
import sys
try:
    import yaml
    with open(".agents/pr-review.yml") as f:
        d = yaml.safe_load(f) or {}
    print("true" if (d.get("dco") or {}).get("required") is True else "false")
except Exception:
    print("false")
PYEOF
)
            [[ "$val" == "true" ]] && REQUIRED="true"
          fi
          echo "required=${REQUIRED}" >> "$GITHUB_OUTPUT"
          echo "DCO required: ${REQUIRED}"

      - name: Check DCO sign-off on all commits
        if: steps.cfg.outputs.required == 'true'
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          MISSING=0
          while IFS= read -r SHA; do
            [[ -z "$SHA" ]] && continue
            if ! git log -1 --format="%B" "$SHA" | grep -qE "^Signed-off-by: .+ <.+@.+>"; then
              SUBJECT=$(git log -1 --format="%s" "$SHA")
              echo "::error::Commit $SHA ('$SUBJECT') is missing a Signed-off-by trailer."
              MISSING=$((MISSING + 1))
            fi
          done < <(git log --no-merges --format="%H" "$BASE..$HEAD")
          if (( MISSING > 0 )); then
            echo "::error::${MISSING} commit(s) missing DCO sign-off. Add with: git commit -s"
            exit 1
          fi
          echo "All commits carry DCO sign-off."
